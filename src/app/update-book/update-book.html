<div class="form-page">
  <div class="form-card">
    <div class="form-card-header">
      <div class="form-card-icon">✏️</div>
      <div>
        <h2 class="page-title">Modifier le livre</h2>
        <p class="page-subtitle">Mettez à jour les informations ci-dessous</p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="book-form">
      <div class="form-group">
        <label class="form-label" for="bookName">Titre du livre</label>
        <input
          type="text"
          class="form-control"
          id="bookName"
          name="name"
          [(ngModel)]="book.name"
          placeholder="Ex. Le Petit Prince"
          required>
      </div>

      <div class="form-group">
        <label class="form-label" for="bookPages">Nombre de pages</label>
        <input
          type="number"
          class="form-control"
          id="bookPages"
          name="pages"
          [(ngModel)]="book.pages"
          placeholder="Ex. 256"
          min="1"
          required>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="goToListeLivre()">
          Annuler
        </button>
        <button type="submit" class="btn btn-primary">
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>
