<!-- liste-livres.html -->
<h2>Liste des livres existants</h2>

  <div class="row mb-3 align-items-center">
  <div class="col-md-6">
    <form class="form-inline">
      <input class="form-control mr-sm-2" type="search" placeholder="Rechercher" aria-label="Search">
      <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Rechercher</button>
    </form>
  </div>
  
  <div class="col-md-6 d-flex justify-content-end">
    <mat-paginator
      [length]="livreCompteur"
      [pageSize]="5"
      [showFirstLastButtons]="true"
      [pageSizeOptions]="[3, 5, 10]"
      [pageIndex]="currentPage"
      (page)="handlePageEvent($event)"
    >
    </mat-paginator>
  </div>
</div>
<table class="table table-striped table-bordered">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Pages</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @if(loading)
    {
      <tr><td colspan="4">Chargement...</td></tr>
    }
    @else
    {
      @for(book of books; track book.id)
      {
        <tr>
          <td>{{book.id}}</td>
          <td>{{book.name}}</td>
          <td>{{book.pages}}</td>
          <td>
            <button (click) = "updateBook(book.id)" class="btn btn-info">Modifier</button> <!--Le (click) est le click event d'Angular-->
            <button (click) = "deleteBook(book.id)" class="btn btn-danger" style="margin-left: 15px;">Supprimer</button>
          </td>
        </tr>
      }
      @empty {
        <tr><td colspan="4">Aucun livre disponible.</td></tr>
      }
    }
  </tbody>
</table>
