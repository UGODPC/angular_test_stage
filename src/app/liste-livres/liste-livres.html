<!-- liste-livres.html -->
<h2>Liste des livres existants</h2>

<div>
  <button mat-raised-button (click)="exportToExcel()" class="btn btn-secondary" style="margin-bottom: 15px;">
      📊 Exporter le tout vers Excel
    </button>
</div>

  
<div class="oe">
  <mat-form-field style="width: 35%;">
    <mat-label>Filtre</mat-label>
    <input matInput (keyup)="applyNameFilter($event)" placeholder="Ex. Harry Potter" #input>
  </mat-form-field>

  <mat-form-field style="width: 20%; margin-left: 15px;">
    <mat-label>Min</mat-label>
    <input matInput (keyup)="applyMinPagesFilter($event)" placeholder="Ex. 100" #input>
  </mat-form-field>

  <mat-form-field style="width: 20%; margin-left: 15px;">
    <mat-label>Max</mat-label>
    <input matInput (keyup)="applyMaxPagesFilter($event)" placeholder="Ex. 200" #input>
  </mat-form-field>

  <div class="col-md-6 d-flex justify-content-end">
    <mat-paginator
      [length]="dataSource.filteredData.length"
      [pageSize]="5"
      [showFirstLastButtons]="true"
      [pageSizeOptions]="[3, 5, 10]"
      [pageIndex]="currentPage"
      (page)="handlePageEvent($event)"
    >
    </mat-paginator>
  </div>
</div>

<table mat-table [dataSource]="dataSource" class="table table-striped table-bordered">
  
  <!-- Colonne ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let book"> {{ book.id }} </td>
  </ng-container>

  <!-- Colonne Nom -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Nom </th>
    <td mat-cell *matCellDef="let book"> {{ book.name }} </td>
  </ng-container>

  <!-- Colonne Pages -->
  <ng-container matColumnDef="pages">
    <th mat-header-cell *matHeaderCellDef> Pages </th>
    <td mat-cell *matCellDef="let book"> {{ book.pages }} </td>
  </ng-container>

  <!-- Colonne Actions -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let book">
      <button (click)="updateBook(book.id)" class="btn btn-info btn-sm">Modifier</button>
      <button (click)="deleteBook(book.id)" class="btn btn-danger btn-sm" style="margin-left: 10px;">Supprimer</button>
    </td>
  </ng-container>

  <!-- Ligne d'en-tête -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  
  <!-- Lignes de données -->
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- Message quand pas de données -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" [attr.colspan]="displayedColumns.length" style="text-align: center; padding: 20px;">
      @if (loading)
      {
        ⏳ Chargement des livres...
      }
      @else
      {
        📭 Aucun livre disponible.
      }
    </td>
  </tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
  </tr>
</table>
