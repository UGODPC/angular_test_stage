<h2>Liste des livres existants</h2>
<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Pages</th>
        </tr>
    </thead>
    <tbody>
        @for(book of books; track book.id) {
            <tr>
                <td>{{book.id}}</td>
                <td>{{book.name}}</td>
                <td>{{book.pages}}</td>
            </tr>
        }
        @empty {
            <tr>
                <td colspan="3">Aucun livre disponible.</td>
            </tr>
        }
    </tbody>
</table>
