<!-- liste-livres.html -->
<h2>Liste des livres existants</h2>


  <mat-paginator
  [length]="500"
  [pageSize]="10"
  [showFirstLastButtons]="true"
  [pageSizeOptions]="[5, 10, 20]"
  [pageIndex]="currentPage"
  (page)="handlePageEvent($event)"
  >
</mat-paginator>

<table class="table table-striped table-bordered">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Pages</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @if (books$ | async; as books) {
      @for(book of books; track book.id) {
        <tr>
          <td>{{book.id}}</td>
          <td>{{book.name}}</td>
          <td>{{book.pages}}</td>
          <td>
            <button (click) = "updateBook(book.id)" class="btn btn-info">Modifier</button> <!--Le (click) est le click event d'Angular-->
            <button (click) = "deleteBook(book.id)" class="btn btn-danger" style="margin-left: 15px;">Supprimer</button>
          </td>
        </tr>
      }
      @empty {
        <tr><td colspan="4">Aucun livre disponible.</td></tr>
      }
    } @else {
      <tr><td colspan="4">Chargement...</td></tr>
    }
  </tbody>
</table>
