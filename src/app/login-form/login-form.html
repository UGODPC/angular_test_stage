<div class="auth-card">
  <!-- Tabs -->
  <div class="auth-tabs">
    <button
      class="auth-tab"
      [class.active]="active === 'login'"
      (click)="onLoginTab()">
      Se connecter
    </button>
    <button
      class="auth-tab"
      [class.active]="active === 'register'"
      (click)="onRegisterTab()">
      Créer un compte
    </button>
  </div>

  <!-- Login Form -->
  @if(active === 'login') {
    <form (ngSubmit)="onSubmitLogin()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="loginName">Nom d'utilisateur</label>
        <input
          class="form-control"
          type="text"
          id="loginName"
          name="login"
          [(ngModel)]="login"
          placeholder="Votre identifiant"
          autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Mot de passe</label>
        <input
          class="form-control"
          type="password"
          id="loginPassword"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 0.5rem;">
        Se connecter
      </button>
    </form>
  }

  <!-- Register Form -->
  @if(active === 'register') {
    <form (ngSubmit)="onSubmitRegister()" class="auth-form">
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label" for="firstName">Prénom</label>
          <input
            class="form-control"
            type="text"
            id="firstName"
            name="firstName"
            [(ngModel)]="firstName"
            placeholder="Jean"
            autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Nom</label>
          <input
            class="form-control"
            type="text"
            id="lastName"
            name="lastName"
            [(ngModel)]="lastName"
            placeholder="Dupont"
            autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regLogin">Nom d'utilisateur</label>
        <input
          class="form-control"
          type="text"
          id="regLogin"
          name="login"
          [(ngModel)]="login"
          placeholder="jean.dupont"
          autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">Mot de passe</label>
        <input
          class="form-control"
          type="password"
          id="regPassword"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top: 0.5rem;">
        Créer le compte
      </button>
    </form>
  }
</div>
